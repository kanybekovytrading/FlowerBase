server:
  port: 8080

spring:
  application:
    name: flora-boutique

  datasource:
    url: jdbc:postgresql://postgres.railway.internal:5432/railway
    username: postgres
    password: JbEWosJolCfSTEouBkpBPqqZxDKCcgAw
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  info:
    title: Flora Boutique API
    version: 1.0.0

logging:
  level:
    com.florashop: DEBUG
    org.hibernate.SQL: DEBUG
